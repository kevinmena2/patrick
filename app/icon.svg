<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect width="32" height="18" rx="7" fill="url(#shine)"/>

  <!-- Letter P (evenodd = transparent bowl) -->
  <path
    fill-rule="evenodd"
    fill="white"
    d="M 7,5
       L 7,27
       L 11,27
       L 11,18
       L 16,18
       Q 25,18 25,11.5
       Q 25,5 16,5
       Z
       M 11,8.5
       L 16,8.5
       Q 21.5,8.5 21.5,11.5
       Q 21.5,14.5 16,14.5
       L 11,14.5
       Z"
  />

  <!-- Small pink accent dot (bottom-right) -->
  <circle cx="25" cy="25" r="3.5" fill="#f9a8d4" opacity="0.9"/>
  <circle cx="25" cy="25" r="2" fill="white" opacity="0.95"/>
</svg>
